<!DOCTYPE html>
<html lang="ko">
<head>
  <script>
    (function(){
      var d=document.documentElement;
      if(!d)return;
      d.classList.add('tt-preparing','tt-no-transitions');
      var id='tt-inline-boot';
      if(!document.getElementById(id)){
        var s=document.createElement('style');
        s.id=id;
        s.textContent="html.tt-preparing body{opacity:0!important}html.tt-no-transitions *,html.tt-no-transitions *::before,html.tt-no-transitions *::after{transition:none!important;animation:none!important}html:not(.fonts-ready) .material-symbols-outlined,html:not(.fonts-ready) .material-icons{visibility:hidden}";
        (document.head||document.documentElement).appendChild(s);
      }
      setTimeout(function(){
        d.classList.remove('tt-preparing');
        d.classList.remove('tt-no-transitions');
        d.classList.add('fonts-ready');
      },250);
    })();
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀 대시보드</title>
  <script src="../vendor/tailwind.cdn.js"></script>
  <link href="../vendor/plus-jakarta.css" rel="stylesheet" />
  <link href="../vendor/material-symbols.css" rel="stylesheet" />
  <script src="app.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#eb4770',
            'background-light': '#f8f6f6',
            'background-dark': '#211115'
          },
          fontFamily: {
            display: ['Plus Jakarta Sans', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    body {
      min-height: max(884px, 100dvh);
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
  <div class="max-w-md mx-auto bg-white dark:bg-background-dark min-h-screen shadow-xl flex flex-col relative">
    <header class="sticky top-0 z-20 bg-white/85 dark:bg-background-dark/85 backdrop-blur-md border-b border-primary/10">
      <div class="flex items-center p-4 justify-between">
        <button id="btnBack" class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight flex-1 text-center">팀 대시보드</h1>
        <button class="flex size-10 items-center justify-center rounded-full hover:bg-primary/10 transition-colors text-slate-900 dark:text-slate-100">
          <span class="material-symbols-outlined">share</span>
        </button>
      </div>
      <div class="px-4 pb-4">
        <div class="flex justify-between items-center bg-primary/5 rounded-lg p-1">
          <button data-period="weekly" class="tab-btn flex-1 py-2 text-center rounded-md bg-white dark:bg-primary text-primary dark:text-white shadow-sm font-bold text-sm transition-all">주간</button>
          <button data-period="monthly" class="tab-btn flex-1 py-2 text-center text-slate-500 dark:text-slate-400 font-bold text-sm transition-all hover:bg-white/50">월간</button>
          <button data-period="yearly" class="tab-btn flex-1 py-2 text-center text-slate-500 dark:text-slate-400 font-bold text-sm transition-all hover:bg-white/50">연간</button>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar pb-24">
      <section class="p-4">
        <h2 class="text-slate-900 dark:text-slate-100 text-xl font-extrabold pb-4">최고 달성 멤버</h2>
        <div class="relative overflow-hidden rounded-xl bg-gradient-to-br from-primary to-primary/80 p-6 text-white shadow-lg shadow-primary/20">
          <div class="flex justify-between items-center">
            <div class="flex flex-col gap-2">
              <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-white/20 text-white backdrop-blur-sm w-fit">
                <span class="material-symbols-outlined text-xs mr-1">workspace_premium</span> 순위 #1
              </span>
              <p id="topMemberName" class="text-2xl font-bold">김지연</p>
              <p id="topMemberStat" class="text-white/90 text-sm font-medium">98% 목표 달성</p>
            </div>
            <div class="size-24 rounded-full border-4 border-white/30 overflow-hidden bg-white/10 shrink-0 flex items-center justify-center text-4xl">
              <span id="topMemberAvatar">🧑</span>
            </div>
          </div>
        </div>
      </section>

      <section class="p-4 pt-0">
        <div class="flex items-center justify-between pb-4">
          <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold">최고 응원가 (준 사람)</h2>
          <span class="text-primary text-xs font-bold uppercase tracking-wider">상위 2명</span>
        </div>
        <div class="space-y-3">
          <div class="flex items-center gap-4 rounded-xl bg-white dark:bg-slate-800/50 p-3 border border-slate-100 dark:border-slate-800">
            <div class="size-12 rounded-full bg-primary/10 text-primary flex items-center justify-center text-xl"><span id="supporter1Avatar">👩</span></div>
            <div class="flex-1">
              <p id="supporter1Name" class="font-bold text-slate-900 dark:text-slate-100">이민수</p>
              <p class="text-slate-500 dark:text-slate-400 text-xs">팀의 활력소</p>
            </div>
            <div class="text-right">
              <p id="supporter1Score" class="text-primary font-extrabold text-lg">142</p>
              <p class="text-slate-400 dark:text-slate-500 text-[10px] uppercase font-bold">응원</p>
            </div>
          </div>

          <div class="flex items-center gap-4 rounded-xl bg-white dark:bg-slate-800/50 p-3 border border-slate-100 dark:border-slate-800">
            <div class="size-12 rounded-full bg-primary/10 text-primary flex items-center justify-center text-xl"><span id="supporter2Avatar">🧔</span></div>
            <div class="flex-1">
              <p id="supporter2Name" class="font-bold text-slate-900 dark:text-slate-100">박서준</p>
              <p class="text-slate-500 dark:text-slate-400 text-xs">긍정 에너지 메이커</p>
            </div>
            <div class="text-right">
              <p id="supporter2Score" class="text-primary font-extrabold text-lg">118</p>
              <p class="text-slate-400 dark:text-slate-500 text-[10px] uppercase font-bold">응원</p>
            </div>
          </div>
        </div>
      </section>

      <section class="p-4 pt-0">
        <div class="flex items-center justify-between pb-4">
          <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold">최고 인기왕 (받은 사람)</h2>
          <span class="text-primary text-xs font-bold uppercase tracking-wider">상위 2명</span>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800 flex flex-col items-center text-center">
            <div class="relative mb-3">
              <div class="size-16 rounded-full bg-primary/10 text-primary text-2xl flex items-center justify-center border-2 border-primary">
                <span id="popular1Avatar">👨‍💻</span>
              </div>
              <div class="absolute -bottom-1 -right-1 bg-primary text-white size-6 rounded-full flex items-center justify-center border-2 border-white dark:border-slate-800">
                <span class="material-symbols-outlined text-xs">favorite</span>
              </div>
            </div>
            <p id="popular1Name" class="font-bold text-sm text-slate-900 dark:text-slate-100">최지원</p>
            <p id="popular1Score" class="text-primary font-black text-xl mt-1">86</p>
            <p class="text-slate-400 dark:text-slate-500 text-[10px] uppercase font-bold">응원</p>
          </div>

          <div class="bg-white dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800 flex flex-col items-center text-center">
            <div class="relative mb-3">
              <div class="size-16 rounded-full bg-primary/10 text-primary text-2xl flex items-center justify-center border-2 border-primary/40">
                <span id="popular2Avatar">👩‍🎨</span>
              </div>
              <div class="absolute -bottom-1 -right-1 bg-primary/40 text-white size-6 rounded-full flex items-center justify-center border-2 border-white dark:border-slate-800">
                <span class="material-symbols-outlined text-xs">favorite</span>
              </div>
            </div>
            <p id="popular2Name" class="font-bold text-sm text-slate-900 dark:text-slate-100">정다은</p>
            <p id="popular2Score" class="text-primary/60 font-black text-xl mt-1">74</p>
            <p class="text-slate-400 dark:text-slate-500 text-[10px] uppercase font-bold">응원</p>
          </div>
        </div>
      </section>

      <section class="p-4 pt-0">
        <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold pb-4">팀 멤버</h2>
        <div id="memberRow" class="flex overflow-x-auto gap-4 pb-2 -mx-4 px-4 no-scrollbar"></div>
      </section>
    </main>

    <nav id="bottomNav" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md flex gap-2 border-t border-slate-100 dark:border-slate-800 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md px-4 pb-6 pt-2 z-[70]">
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary" href="#"><span class="material-symbols-outlined text-[28px]">check_circle</span><p class="text-xs font-medium">할일</p></a>
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary" href="#"><span class="material-symbols-outlined text-[28px]">calendar_month</span><p class="text-xs font-medium">캘린더</p></a>
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#"><span class="material-symbols-outlined text-[28px]" style="font-variation-settings:'FILL' 1">groups</span><p class="text-xs font-bold">팀</p></a>
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary" href="#"><span class="material-symbols-outlined text-[28px]">flag</span><p class="text-xs font-medium">목표</p></a>
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary" href="#"><span class="material-symbols-outlined text-[28px]">settings</span><p class="text-xs font-medium">설정</p></a>
    </nav>
  </div>

  <script>
    const dashboardData = {
      weekly: {
        topMember: { name: '김지연', stat: '98% 목표 달성', avatar: '🧑' },
        supporters: [
          { name: '이민수', score: '142', avatar: '👩' },
          { name: '박서준', score: '118', avatar: '🧔' }
        ],
        popular: [
          { name: '최지원', score: '86', avatar: '👨‍💻' },
          { name: '정다은', score: '74', avatar: '👩‍🎨' }
        ]
      },
      monthly: {
        topMember: { name: '이민수', stat: '95% 목표 달성', avatar: '👩' },
        supporters: [
          { name: '박서준', score: '320', avatar: '🧔' },
          { name: '정다은', score: '290', avatar: '👩‍🎨' }
        ],
        popular: [
          { name: '김지연', score: '280', avatar: '🧑' },
          { name: '최지원', score: '260', avatar: '👨‍💻' }
        ]
      },
      yearly: {
        topMember: { name: '정다은', stat: '92% 목표 달성', avatar: '👩‍🎨' },
        supporters: [
          { name: '최지원', score: '3,500', avatar: '👨‍💻' },
          { name: '이민수', score: '3,200', avatar: '👩' }
        ],
        popular: [
          { name: '박서준', score: '2,900', avatar: '🧔' },
          { name: '김지연', score: '2,800', avatar: '🧑' }
        ]
      }
    };

    const members = [
      { name: '김지연', avatar: '🧑' },
      { name: '이민수', avatar: '👩' },
      { name: '박서준', avatar: '🧔' },
      { name: '최지원', avatar: '👨‍💻' },
      { name: '정다은', avatar: '👩‍🎨' }
    ];

    function renderMembers() {
      const row = document.getElementById('memberRow');
      row.innerHTML = members.map((m) => `
        <div class="flex flex-col items-center gap-2 min-w-[64px]">
          <div class="size-16 rounded-full bg-primary/10 text-2xl flex items-center justify-center border-2 border-slate-100 dark:border-slate-700">${m.avatar}</div>
          <span class="text-xs font-medium text-slate-700 dark:text-slate-300">${m.name}</span>
        </div>
      `).join('');
    }

    function switchTab(period) {
      const data = dashboardData[period];
      if (!data) return;

      document.getElementById('topMemberName').textContent = data.topMember.name;
      document.getElementById('topMemberStat').textContent = data.topMember.stat;
      document.getElementById('topMemberAvatar').textContent = data.topMember.avatar;

      document.getElementById('supporter1Name').textContent = data.supporters[0].name;
      document.getElementById('supporter1Score').textContent = data.supporters[0].score;
      document.getElementById('supporter1Avatar').textContent = data.supporters[0].avatar;
      document.getElementById('supporter2Name').textContent = data.supporters[1].name;
      document.getElementById('supporter2Score').textContent = data.supporters[1].score;
      document.getElementById('supporter2Avatar').textContent = data.supporters[1].avatar;

      document.getElementById('popular1Name').textContent = data.popular[0].name;
      document.getElementById('popular1Score').textContent = data.popular[0].score;
      document.getElementById('popular1Avatar').textContent = data.popular[0].avatar;
      document.getElementById('popular2Name').textContent = data.popular[1].name;
      document.getElementById('popular2Score').textContent = data.popular[1].score;
      document.getElementById('popular2Avatar').textContent = data.popular[1].avatar;

      const active = ['bg-white', 'dark:bg-primary', 'text-primary', 'dark:text-white', 'shadow-sm'];
      const inactive = ['text-slate-500', 'dark:text-slate-400', 'hover:bg-white/50'];
      document.querySelectorAll('.tab-btn').forEach((btn) => {
        if (btn.dataset.period === period) {
          btn.classList.remove(...inactive);
          btn.classList.add(...active);
        } else {
          btn.classList.remove(...active);
          btn.classList.add(...inactive);
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderMembers();
      switchTab('weekly');

      document.querySelectorAll('.tab-btn').forEach((btn) => {
        btn.addEventListener('click', () => switchTab(btn.dataset.period));
      });

      document.getElementById('btnBack').addEventListener('click', () => {
        if (window.TeamTodo && typeof TeamTodo.navigate === 'function') {
          TeamTodo.navigate('team_list');
        }
      });

      const bottomNavLinks = document.querySelectorAll('#bottomNav a');
      const bottomNavScreens = ['todo_main', 'calendar', 'team_list', 'goal_list', 'settings'];
      bottomNavLinks.forEach((el, idx) => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          if (window.TeamTodo && typeof TeamTodo.navigate === 'function') {
            TeamTodo.navigate(bottomNavScreens[idx]);
          }
        });
      });
    });
  </script>
</body>
</html>
