<script>
        function setTheme(color, lightColor, btn) {
            // Update CSS variables
            document.documentElement.style.setProperty('--primary-color', color);
            document.documentElement.style.setProperty('--primary-light', lightColor);
            // Remove checkmark and shadow from all buttons
            const buttons = document.querySelectorAll('.theme-btn');
            buttons.forEach(b => {
                b.style.boxShadow = 'none';
                const icon = b.querySelector('.material-symbols-outlined');
                if(icon) icon.classList.add('hidden');
            });
            // Add checkmark and shadow to selected button
            // Box shadow color logic: Primary color with ~30% opacity (4D in hex)
            btn.style.boxShadow = `0 0 0 2px #fff, 0 0 0 4px ${color}4D`;
            const icon = btn.querySelector('.material-symbols-outlined');
            if(icon) icon.classList.remove('hidden');
            // Force update other elements that might not react immediately via Tailwind classes
            const profileCard = document.getElementById('profile-card');
            if(profileCard && !document.documentElement.classList.contains('dark')) {
                 // In light mode, apply the light pastel color directly if needed, though variable handles it
            }
            // Update navigation icon active state color if it's using inline styles or needs specific handling
            const navActiveIcon = document.querySelector('.nav-active-item span');
            if(navActiveIcon) {
                // It uses text-primary so it should update automatically via CSS variable
            }
        }
        function toggleDarkMode(checkbox) {
            if (checkbox.checked) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
             // Default Theme
             const defaultColor = '#eb4770';
             // Default light color
             const defaultLightColor = '#fff5f7';
             // Ensure CSS var is set initially
             document.documentElement.style.setProperty('--primary-color', defaultColor);
             document.documentElement.style.setProperty('--primary-light', defaultLightColor);
             // Initialize button state
             const defaultBtn = document.querySelector(`button[onclick*="'${defaultColor}'"]`);
             if(defaultBtn) {
                 defaultBtn.style.boxShadow = `0 0 0 2px #fff, 0 0 0 4px ${defaultColor}4D`;
                 const icon = defaultBtn.querySelector('.material-symbols-outlined');
                 if(icon) icon.classList.remove('hidden');
             }
             // Check system preference for dark mode
             if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                 // Optional: Auto-enable dark mode based on system preference
                 // document.getElementById('darkModeToggle').checked = true;
                 // toggleDarkMode(document.getElementById('darkModeToggle'));
             }
        });
