    function switchTab(period) {
        const data = dashboardData[period];
        if (!data) return;
        // Update UI Tabs
        const tabs = document.querySelectorAll('.tab-btn');
        const activeClasses = ['bg-white', 'dark:bg-primary', 'text-primary', 'dark:text-white', 'shadow-sm'];
        const inactiveClasses = ['text-slate-500', 'dark:text-slate-400', 'hover:bg-white/50'];
        tabs.forEach((tab, index) => {
            const tabPeriod = ['weekly', 'monthly', 'yearly'][index];
            if (tabPeriod === period) {
                tab.classList.remove(...inactiveClasses);
                tab.classList.add(...activeClasses);
            } else {
                tab.classList.remove(...activeClasses);
                tab.classList.add(...inactiveClasses);
            }
        });
        // Update Content
        // Top Member
        document.getElementById('top-member-name').textContent = data.topMember.name;
        document.getElementById('top-member-stat').textContent = data.topMember.stat;
        document.getElementById('top-member-img').src = data.topMember.img;
        // Supporters
        document.getElementById('supporter-1-name').textContent = data.supporters[0].name;
        document.getElementById('supporter-1-score').textContent = data.supporters[0].score;
        document.getElementById('supporter-1-img').src = data.supporters[0].img;
        document.getElementById('supporter-2-name').textContent = data.supporters[1].name;
        document.getElementById('supporter-2-score').textContent = data.supporters[1].score;
        document.getElementById('supporter-2-img').src = data.supporters[1].img;
        // Popular
        document.getElementById('popular-1-name').textContent = data.popular[0].name;
        document.getElementById('popular-1-score').textContent = data.popular[0].score;
        document.getElementById('popular-1-img').src = data.popular[0].img;
        document.getElementById('popular-2-name').textContent = data.popular[1].name;
        document.getElementById('popular-2-score').textContent = data.popular[1].score;
        document.getElementById('popular-2-img').src = data.popular[1].img;
    }
