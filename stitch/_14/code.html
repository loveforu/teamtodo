<script>
            document.addEventListener('DOMContentLoaded', () => {
                const toggle = document.getElementById('progress-toggle');
                const progressOptions = document.getElementById('progress-options');
                const measurementSection = document.getElementById('measurement-section');
                const targetSettingSection = document.getElementById('target-setting-section');
                const animationOptions = document.getElementById('animation-options');
                const methodRadios = document.querySelectorAll('input[name="measure-method"]');
                const numericInputView = document.getElementById('numeric-input-view');
                const stepsInputView = document.getElementById('steps-input-view');
                function updateVisibility() {
                    if (toggle.checked) {
                        progressOptions.classList.remove('hidden');
                        measurementSection.classList.remove('hidden');
                        targetSettingSection.classList.remove('hidden');
                        animationOptions.classList.remove('hidden');
                        // Check which measurement method is selected and show appropriate input
                        const selectedMethod = document.querySelector('input[name="measure-method"]:checked').value;
                        if (selectedMethod === 'numeric') {
                            numericInputView.classList.remove('hidden');
                            stepsInputView.classList.add('hidden');
                        } else {
                            numericInputView.classList.add('hidden');
                            stepsInputView.classList.remove('hidden');
                        }
                    } else {
                        progressOptions.classList.add('hidden');
                        measurementSection.classList.add('hidden');
                        targetSettingSection.classList.add('hidden');
                        animationOptions.classList.add('hidden');
                    }
                }
                toggle.addEventListener('change', updateVisibility);
                // Add event listeners for radio buttons to switch input views
                methodRadios.forEach(radio => {
                    radio.addEventListener('change', updateVisibility);
                });
                // Initialize state
                updateVisibility();
            });
        </script>
