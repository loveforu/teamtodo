        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;

        }

<script>
        // State variables
        let currentYear;
        let currentMonth;
        let selectedDay;
        // Initial points setup
        let currentTotalPoints = 2410;
        let targetTotalPoints = 5000;
        const taskPointValue = 50; // Points per task
        // Initialize state with today's date
        const today = new Date();
        currentYear = today.getFullYear();
        currentMonth = today.getMonth() + 1; // 1-12 based
        selectedDay = today.getDate();
        // Sample tasks data store
        const tasksStore = {};
        function getTasksForDate(year, month, day) {
            const key = `${year}-${month}-${day}`;
            if (!tasksStore[key]) {
                const titles = [
                    ['아침 요가 20분', '비타민 챙겨 먹기', '프로젝트 기획안 작성'],
                    ['저녁 약속 (강남역)', '책 30페이지 읽기', '가계부 정리'],
                    ['마트 장보기', '빨래 돌리기', '영어 단어 암기'],
                    ['헬스장 가기', '개발 블로그 포스팅', '부모님께 전화하기'],
                    ['방 청소', '밀린 이메일 확인', '유산균 먹기']
                ];
                // Use consistent random set for demo stability
                // Using day % 5 ensures the same set of tasks for the same day number
                const randomSet = titles[day % 5];
                tasksStore[key] = randomSet.map((t, i) => ({
                    id: Date.now() + i + (day * 100), // Unique-ish ID
                    title: t,
                    checked: i === 0 // First item checked by default for demo
                }));
            }
            return tasksStore[key];
        }
        function toggleMonthPicker() {
            const picker = document.getElementById('monthPicker');
            const overlay = document.getElementById('pickerOverlay');
            if (picker.classList.contains('translate-y-full')) {
                picker.classList.remove('hidden');
                overlay.classList.remove('hidden');
                requestAnimationFrame(() => {
                    picker.classList.remove('translate-y-full', 'opacity-0');
                    overlay.classList.remove('opacity-0');
                });
            } else {
                picker.classList.add('translate-y-full', 'opacity-0');
                overlay.classList.add('opacity-0');
                setTimeout(() => {
                    picker.classList.add('hidden');
                    overlay.classList.add('hidden');
                }, 300);
            }
        }
        function renderCalendar(year, month) {
            document.querySelectorAll('.month-title').forEach(el => el.innerText = `${year}년 ${month}월`);
            const firstDay = new Date(year, month - 1, 1).getDay(); // 0 is Sunday
            const daysInMonth = new Date(year, month, 0).getDate();
            const calendarGrid = document.getElementById('calendarGrid');
            calendarGrid.innerHTML = ''; 
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            dayNames.forEach((day, index) => {
                const dayHeader = document.createElement('p');
                dayHeader.className = `${index === 0 ? 'text-primary' : 'text-slate-500'} text-[13px] font-bold h-10 flex items-center justify-center`;
                dayHeader.innerText = day;
                calendarGrid.appendChild(dayHeader);
            });
            if (firstDay > 0) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'h-12 w-full';
                emptyCell.style.gridColumn = `span ${firstDay}`;
                calendarGrid.appendChild(emptyCell);
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const btn = document.createElement('button');
                btn.className = `calendar-day-btn h-12 w-full text-sm hover:bg-primary/5 rounded-full transition-colors relative flex items-center justify-center text-slate-900 dark:text-slate-100`;
                btn.setAttribute('data-day', day);
                btn.onclick = () => selectDate(day, btn);
                btn.innerText = day;
                calendarGrid.appendChild(btn);
            }
            if (selectedDay > daysInMonth) selectedDay = daysInMonth; 
            let dayBtn = calendarGrid.querySelector(`button[data-day="${selectedDay}"]`);
            if (dayBtn) {
                selectDate(selectedDay, dayBtn);
            } else {
                const firstBtn = calendarGrid.querySelector(`button[data-day="1"]`);
                if(firstBtn) selectDate(1, firstBtn);
            }
        }
        function selectDate(day, element) {
            selectedDay = day;
            document.querySelectorAll('.calendar-day-btn').forEach(btn => {
                btn.className = 'calendar-day-btn h-12 w-full text-sm hover:bg-primary/5 rounded-full transition-colors relative flex items-center justify-center text-slate-900 dark:text-slate-100';
                btn.innerHTML = btn.getAttribute('data-day');
            });
            if (!element) {
                element = document.querySelector(`button[data-day="${day}"]`);
            }
            if (element) {
                element.classList.remove('text-slate-900', 'dark:text-slate-100', 'hover:bg-primary/5');
                element.classList.add('text-white', 'font-bold', 'relative', 'group');
                element.innerHTML = `
                    <div class="active-indicator flex size-10 mx-auto items-center justify-center rounded-full bg-primary shadow-lg shadow-primary/30 transition-transform group-active:scale-95 animate-scaleIn">${day}</div>
                `;
            }
            document.getElementById('taskDateTitle').innerText = `${currentMonth}월 ${day}일 할 일`;
            renderTasks();
        }
        function renderTasks() {
            const taskListContainer = document.getElementById('taskListContainer');
            const tasks = getTasksForDate(currentYear, currentMonth, selectedDay);
            const remainingBadge = document.getElementById('remainingCountBadge');
            if (remainingBadge) remainingBadge.innerText = `${tasks.length}개`; 
            if (tasks.length === 0) {
                taskListContainer.innerHTML = `<div class="p-8 text-center text-slate-400 text-sm">등록된 할 일이 없습니다.<br>아래 버튼을 눌러 추가해보세요.</div>`;
            } else {
                let html = '';
                tasks.forEach((task) => {
                    const checkClass = task.checked 
                        ? 'border-primary bg-primary text-white' 
                        : 'border-slate-300 dark:border-slate-500 text-transparent';
                    const textClass = task.checked
                        ? 'text-slate-400 line-through decoration-slate-400'
                        : 'text-slate-700 dark:text-slate-200';
                    const opacityClass = task.checked ? 'opacity-60' : '';
                    html += `
                    <div class="group flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-700/50 hover:bg-primary/5 dark:hover:bg-primary/10 rounded-xl transition-colors border border-transparent hover:border-primary/10 ${opacityClass}" id="task-${task.id}">
                        <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="toggleTaskCheck(${task.id})">
                            <div class="size-5 rounded-full border-2 ${checkClass} flex items-center justify-center shrink-0 transition-colors">
                                <span class="material-symbols-outlined text-[16px] ${task.checked ? '' : 'opacity-0'}">check</span>
                            </div>
                            <span class="text-sm font-medium ${textClass} transition-colors">${task.title}</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <button class="p-2 text-slate-400 hover:text-primary hover:bg-white dark:hover:bg-slate-600 rounded-lg transition-colors active:scale-95">
                                <span class="material-symbols-outlined text-[18px]">edit</span>
                            </button>
                            <button class="p-2 text-slate-400 hover:text-red-500 hover:bg-white dark:hover:bg-slate-600 rounded-lg transition-colors active:scale-95" onclick="deleteTask(${task.id})">
                                <span class="material-symbols-outlined text-[18px]">delete</span>
                            </button>
                        </div>
                    </div>`;
                });
                taskListContainer.innerHTML = html;
            }
             // Add button - Visually clickable, no action as per request
             const addBtn = document.createElement('button');
             addBtn.className = "mt-3 w-full flex items-center justify-center gap-2 py-3 rounded-xl border border-dashed border-primary/40 bg-primary/5 hover:bg-primary/10 text-primary font-bold text-sm transition-all active:scale-[0.98]";
             addBtn.innerHTML = `<span class="material-symbols-outlined text-[20px]">add_circle</span>할 일 추가하기`;
             addBtn.onclick = (e) => { e.preventDefault(); }; 
             taskListContainer.appendChild(addBtn);
        }
        function toggleTaskCheck(id) {
            const key = `${currentYear}-${currentMonth}-${selectedDay}`;
            const task = tasksStore[key].find(t => t.id === id);
            if(task) {
                task.checked = !task.checked;
                // Usually check/uncheck updates current points.
                // Assuming standard behavior: checked adds points, unchecked removes.
                if (task.checked) {
                    currentTotalPoints += taskPointValue;
                } else {
                    currentTotalPoints = Math.max(0, currentTotalPoints - taskPointValue);
                }
                updateProgress();
                renderTasks();
            }
        }
        function deleteTask(id) {
            // Remove popup as per "Eliminate all loading flickers" and "fully operational" request.
            // Direct deletion for instant feedback.
            const key = `${currentYear}-${currentMonth}-${selectedDay}`;
            if (tasksStore[key]) {
                const taskIndex = tasksStore[key].findIndex(t => t.id === id);
                if (taskIndex > -1) {
                    const task = tasksStore[key][taskIndex];
                    // Logic requirement 1: Decrease Total Points (denominator) by 50
                    targetTotalPoints = Math.max(0, targetTotalPoints - taskPointValue);
                    // Logic requirement 2: If task was completed, decrease Current Points (numerator) by 50
                    if (task.checked) {
                        currentTotalPoints = Math.max(0, currentTotalPoints - taskPointValue);
                    }
                    // Remove from data store
                    tasksStore[key].splice(taskIndex, 1);
                    // Update UI immediately
                    renderTasks();
                    updateProgress();
                }
            }
        }
        function updateProgress() {
            const bar = document.getElementById('progressBarInner');
            if(bar) {
                let pct = 0;
                if (targetTotalPoints > 0) {
                   pct = (currentTotalPoints / targetTotalPoints) * 100;
                }
                // Cap at 100% for visual bar
                const visualPct = Math.min(pct, 100);
                bar.style.width = `${visualPct}%`;
                const pointsEl = document.getElementById('currentPoints');
                const formattedCurrent = currentTotalPoints.toLocaleString();
                const formattedTarget = targetTotalPoints.toLocaleString();
                if(pointsEl) pointsEl.innerHTML = `+${formattedCurrent} p <span class="text-slate-400 font-normal">/ ${formattedTarget} p</span>`;
            }
        }
        function selectMonth(year, month) {
            currentYear = year;
            currentMonth = month;
            selectedDay = 1; 
            document.querySelectorAll('#monthPicker .month-btn').forEach(btn => {
               btn.className = "month-btn py-3 rounded-xl bg-slate-50 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-primary/10 hover:text-primary font-medium transition-colors";
               if(parseInt(btn.dataset.month) === month) {
                   btn.className = "month-btn py-3 rounded-xl bg-primary text-white shadow-lg shadow-primary/30 font-bold transition-colors";
               }
            });
            toggleMonthPicker();
            renderCalendar(year, month);
        }
        function changeYear(delta) {
            currentYear += delta;
            document.getElementById('pickerYearDisplay').innerText = `${currentYear}년`;
        }
        document.addEventListener('DOMContentLoaded', () => {
             document.getElementById('pickerYearDisplay').innerText = `${currentYear}년`;
             renderCalendar(currentYear, currentMonth);
             updateProgress();
        });
    </script>
<style>
